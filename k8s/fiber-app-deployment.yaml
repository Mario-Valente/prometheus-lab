apiVersion: apps/v1
kind: Deployment
metadata:
  name: fiber-prometheus-app
  labels:
    app: fiber-prometheus-app
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fiber-prometheus-app
  template:
    metadata:
      labels:
        app: fiber-prometheus-app
        version: v1
    spec:
      containers:
      - name: fiber-app
        image: fiber-prometheus-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: LOG_LEVEL
          value: "info"
        - name: ENVIRONMENT
          value: "development"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL

---
apiVersion: v1
kind: Service
metadata:
  name: fiber-prometheus-app
  labels:
    app: fiber-prometheus-app
    monitoring: enabled
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: fiber-prometheus-app