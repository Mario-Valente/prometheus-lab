apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-script
  labels:
    app: k6-load-test
data:
  fiber-load-test.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';

    const BASE_URL = __ENV.BASE_URL || 'http://fiber-prometheus-app:8080';
    const CONCURRENT_REQUESTS = Number(__ENV.CONCURRENT_REQUESTS || 10);
    const TOTAL_REQUESTS = Number(__ENV.TOTAL_REQUESTS || 9000);
    const REQUEST_DELAY_SECONDS = Number(__ENV.REQUEST_DELAY_SECONDS || 0.1);

    const endpoints = [
        { method: 'GET', path: '/health' },
        { method: 'GET', path: '/api/v1/users' },
        { method: 'POST', path: '/api/v1/users' },
        { method: 'GET', path: '/api/v1/users/123' },
        { method: 'PUT', path: '/api/v1/users/123' },
        { method: 'POST', path: '/load' },
        { method: 'GET', path: '/connections' },
    ];

    export const options = {
        scenarios: {
            fiber_load: {
                executor: 'shared-iterations',
                vus: CONCURRENT_REQUESTS,
                iterations: TOTAL_REQUESTS,
                maxDuration: '15m',
            },
        },
        thresholds: {
            http_req_failed: ['rate<0.05'],
            http_req_duration: ['p(95)<1000'],
        },
    };

    export function setup() {
        const health = http.get(`${BASE_URL}/health`);
        const ok = check(health, {
            'health endpoint disponível': (res) => res.status === 200,
        });

        if (!ok) {
            throw new Error(
                `Fiber app indisponível em ${BASE_URL}`
            );
        }
    }

    export default function () {
        const endpoint = endpoints[Math.floor(Math.random() * endpoints.length)];
        const url = `${BASE_URL}${endpoint.path}`;

        let response;
        if (endpoint.method === 'POST' || endpoint.method === 'PUT') {
            const payload = JSON.stringify({
                name: 'Test User',
                email: 'test@example.com',
            });

            response = http.request(endpoint.method, url, payload, {
                headers: { 'Content-Type': 'application/json' },
                tags: { endpoint: `${endpoint.method} ${endpoint.path}` },
            });
        } else {
            response = http.request(endpoint.method, url, null, {
                tags: { endpoint: `${endpoint.method} ${endpoint.path}` },
            });
        }

        check(response, {
            'status válido': (res) => res.status >= 200 && res.status < 500,
        });

        sleep(REQUEST_DELAY_SECONDS);
    }

---
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-load-test
  labels:
    app: k6-load-test
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: k6-load-test
    spec:
      serviceAccountName: default
      restartPolicy: Never
      containers:
      - name: k6
        image: grafana/k6:latest
        imagePullPolicy: IfNotPresent
        command:
          - k6
          - run
          - /scripts/fiber-load-test.js
        env:
        - name: BASE_URL
          value: "http://fiber-prometheus-app:8080"
        - name: CONCURRENT_REQUESTS
          value: "10"
        - name: TOTAL_REQUESTS
          value: "9000"
        - name: REQUEST_DELAY_SECONDS
          value: "0.1"
        volumeMounts:
        - name: k6-script
          mountPath: /scripts
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: k6-script
        configMap:
          name: k6-script
          defaultMode: 0755
